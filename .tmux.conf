# Remap prefix to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Easier splits — use current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# New session
bind N new-session

# Mouse support
set -g mouse on

# ── Status bar ──
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=white"

# Left: session name (doubles as worktree identifier)
set -g status-left-length 30
set -g status-left "#[fg=black,bg=green,bold] #S #[default] "

# Right: git branch + status via shell
set -g status-right-length 80
set -g status-right "#[fg=dim]#(echo #{pane_current_path} | sed \"s|$HOME|~|\")#[default] #[fg=cyan]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null)#[default] #[fg=yellow]#(cd #{pane_current_path} && git status --porcelain 2>/dev/null | wc -l | tr -d ' ')#[fg=dim]∆#[default] "

# Selection / copy-mode highlight
set -g mode-style "bg=magenta,fg=black"

# Pane borders
set -g pane-active-border-style "fg=magenta"
set -g pane-border-style "fg=colour237"

# Window tabs
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=black,bg=white,bold] #I:#W "
